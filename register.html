{% extends "base.html" %}
{% block content %}
<div class="px-6 py-16 flex flex-col items-center justify-center min-h-screen bg-[#E6D9C7] dark:bg-black transition-colors duration-500">
    <div class="w-full max-w-sm p-8 bg-white/60 dark:bg-white/5 rounded-[3rem] glass border border-white/20 shadow-2xl">
        <div class="text-center mb-10">
            <img src="/static/logo.png" alt="Logo Emaús" class="w-24 h-auto mx-auto mb-6 drop-shadow-2xl">
            <h1 class="text-3xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-br from-slate-900 via-slate-800 to-slate-500 dark:from-white dark:via-slate-200 dark:to-slate-400 drop-shadow-lg">
                ROSARIO DE EMAUS
            </h1>
            <p class="text-[0.6rem] font-bold uppercase tracking-[0.5em] text-slate-500 dark:text-slate-400 mt-1">CAMINO DE FE</p>
            <div class="h-[2px] w-8 bg-gradient-to-r from-indigo-500 to-cyan-500 mx-auto mt-4 rounded-full opacity-40"></div>
            <p class="text-[0.65rem] font-bold text-gray-400 uppercase tracking-[0.2em] mt-6">Crear Cuenta</p>
        </div>
        <form method="POST" class="space-y-4">
            <div class="space-y-1">
                <input type="text" name="username" placeholder="Nuevo Usuario" required 
                    class="w-full p-4 bg-white/50 dark:bg-white/10 rounded-2xl border border-gray-200 dark:border-white/10 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <div class="space-y-1">
                <input type="password" name="password" placeholder="Contraseña" required 
                    class="w-full p-4 bg-white/50 dark:bg-white/10 rounded-2xl border border-gray-200 dark:border-white/10 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <button type="submit" class="w-full py-4 bg-gradient-to-r from-blue-600 to-blue-500 text-white font-black rounded-2xl shadow-xl shadow-blue-500/30 active:scale-95 transition-transform">REGISTRARSE</button>
        </form>
        <p class="mt-8 text-center text-sm font-medium text-gray-500">
            ¿Ya tienes cuenta? <a href="{{ url_for('login') }}" class="text-blue-500 font-bold">Inicia sesión</a>
        </p>
    </div>
</div>
{% endblock %}
