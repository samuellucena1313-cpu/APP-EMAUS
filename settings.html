{% extends "base.html" %}
{% block content %}
<div class="px-6 py-8 min-h-screen bg-[#E6D9C7] dark:bg-black transition-colors duration-500">
    <div class="flex items-center mb-8">
        <a href="{{ url_for('index') }}" class="text-blue-500 font-bold text-lg flex items-center px-4 py-2 bg-blue-500/10 rounded-full transition-all duration-300 ease-out active:scale-95 active:bg-blue-500/20">
            <span class="mr-1 text-2xl">‹</span> Volver
        </a>
    </div>
    
    <h1 class="text-4xl font-extrabold tracking-tight mb-8 px-2">Ajustes</h1>
    
    <form action="{{ url_for('settings') }}" method="POST" enctype="multipart/form-data" class="space-y-8">
        <div class="p-6 rounded-[2.5rem] space-y-8 glass">
            <div>
                <label class="block text-blue-500 font-black uppercase tracking-[0.2em] text-sm mb-3 px-1">Nombre de Usuario</label>
                <input type="text" name="username" value="{{ config.username }}"
                    class="w-full px-5 py-4 rounded-2xl dark:bg-black/20 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-lg font-medium shadow-sm">
            </div>

            <div>
                <label class="block text-blue-500 font-black uppercase tracking-[0.2em] text-sm mb-4 px-1">Foto de Perfil</label>
                <div class="flex items-center space-x-6 bg-black/5 dark:bg-white/5 p-6 rounded-[2rem] shadow-sm">
                    <div class="relative w-20 h-20 rounded-full overflow-hidden bg-gray-200 dark:bg-gray-800 flex-shrink-0">
                        <img id="preview" src="{{ config.profile_pic }}" class="w-full h-full object-cover {% if not config.profile_pic %}hidden{% endif %}">
                        {% if not config.profile_pic %}
                        <div id="placeholder" class="w-full h-full flex items-center justify-center text-gray-400">
                            <span class="text-2xl font-bold uppercase">{{ config.username[0] if config.username else '?' }}</span>
                        </div>
                        {% endif %}
                    </div>
                    <div class="flex-grow">
                        <label class="cursor-pointer">
                            <span class="inline-block px-6 py-3 rounded-full bg-blue-500 text-white font-bold text-sm transition-all duration-300 ease-out active:scale-95 active:brightness-90 shadow-lg shadow-blue-500/20">
                                Elegir de la Galería
                            </span>
                            <input type="file" name="profile_pic_file" accept="image/*" class="hidden" onchange="updatePreview(this)">
                        </label>
                        <p class="text-[0.6rem] text-gray-400 mt-2 font-medium px-1">Formatos: JPG, PNG o HEIC</p>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-blue-500 font-black uppercase tracking-[0.2em] text-sm mb-3 px-1">Apariencia</label>
                <select name="theme" class="w-full px-5 py-4 rounded-2xl dark:bg-black/20 focus:ring-2 focus:ring-blue-500 outline-none transition-all appearance-none text-lg font-medium shadow-sm">
                    <option value="light" {% if config.theme == 'light' %}selected{% endif %}>Modo Claro</option>
                    <option value="dark" {% if config.theme == 'dark' %}selected{% endif %}>Modo Oscuro</option>
                </select>
            </div>
        </div>

        <button type="submit" 
            class="w-full py-6 bg-gradient-to-r from-blue-600 to-blue-500 text-white font-black text-xl rounded-[2.5rem] shadow-2xl shadow-blue-500/30 transition-all duration-300 ease-out active:scale-95 active:brightness-90 uppercase tracking-widest">
            Guardar Cambios
        </button>
    </form>
</div>

<script>
function updatePreview(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const preview = document.getElementById('preview');
            const placeholder = document.getElementById('placeholder');
            preview.src = e.target.result;
            preview.classList.remove('hidden');
            if (placeholder) placeholder.classList.add('hidden');
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
