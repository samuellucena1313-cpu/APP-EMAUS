{% extends "base.html" %}
{% block content %}
<style>
    @keyframes imagePulse {
        0% { transform: scale(1); box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.25); }
        50% { transform: scale(1.01); box-shadow: 0 35px 60px -15px rgba(59, 130, 246, 0.4); }
        100% { transform: scale(1); box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.25); }
    }
    @keyframes subtlePulse {
        0% { transform: scale(1); filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        50% { transform: scale(1.08); filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5)); }
        100% { transform: scale(1); filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
    }
    .animate-imagePulse {
        animation: imagePulse 3s infinite ease-in-out;
    }
    .animate-subtle-pulse {
        animation: subtlePulse 4s infinite ease-in-out;
    }
</style>
<div class="px-6 pt-16 pb-12 overflow-y-auto flex-grow scroll-smooth bg-[#E6D9C7] dark:bg-black transition-colors duration-500 min-h-screen">
    <!-- Cabecera Premium -->
    <div class="flex justify-between items-center mb-8 px-2">
        <div>
            <h1 class="text-4xl font-black tracking-tighter mb-1 bg-clip-text text-transparent bg-gradient-to-br from-slate-900 via-slate-800 to-slate-500 dark:from-white dark:via-slate-200 dark:to-slate-400 drop-shadow-xl">
                ROSARIO DE EMAUS
            </h1>
            <p class="text-[0.65rem] font-bold uppercase tracking-[0.6em] text-slate-500 dark:text-slate-400 ml-1">CAMINO DE FE</p>
        </div>
        <div class="w-12 h-12 rounded-full shadow-xl flex items-center justify-center overflow-hidden bg-gradient-to-tr from-blue-600 to-blue-400 rotate-3 hover:rotate-0 transition-transform duration-500 shadow-blue-500/20">
            {% if config.profile_pic %}
                <img src="{{ config.profile_pic }}" alt="Perfil" class="w-full h-full object-cover">
            {% else %}
                <span class="text-white font-bold text-xl uppercase">{{ config.username[0] }}</span>
            {% endif %}
        </div>
    </div>

    <!-- Widget de Reflexión Dinámica -->
    <div class="relative group rounded-[3.5rem] p-8 mb-8 glass overflow-hidden transition-all duration-700 shadow-2xl shadow-blue-500/20 h-48 flex flex-col">
        <h2 class="text-sm uppercase tracking-[0.4em] text-slate-500 dark:text-slate-400 font-black mb-4 shrink-0 text-center">Meditación del Día</h2>
        <div class="flex-grow flex items-center justify-center overflow-hidden px-2">
            <p id="dynamic-reflection" class="text-xl leading-relaxed font-bold text-gray-800 dark:text-gray-100 transition-all duration-700 ease-in-out text-center">
                "Caminar con Jesús transforma la tristeza en esperanza."
            </p>
        </div>
    </div>
    
    <!-- Menú de Acciones -->
    <div class="grid grid-cols-2 gap-8">
        <!-- Botón Principal: Ocupa 2 columnas -->
        <a href="{{ url_for('prayer') }}" class="col-span-2 relative group flex items-center justify-between p-8 bg-gradient-to-br from-blue-600 to-blue-500 text-white rounded-[2.5rem] shadow-2xl shadow-blue-500/30 transition-all duration-300 ease-out active:scale-95 active:brightness-90 overflow-hidden">
            <div class="relative z-10">
                <span class="block text-[0.65rem] font-bold uppercase tracking-[0.5em] text-white/80 mb-3">Comenzar Rezo</span>
                <span class="text-3xl font-black tracking-tighter leading-none drop-shadow-lg">Rezar Rosario</span>
            </div>
            <div class="bg-white/20 p-4 rounded-3xl backdrop-blur-md">
                <span class="text-3xl">📿</span>
            </div>
            <div class="absolute -right-4 -bottom-4 w-32 h-32 bg-white/10 rounded-full blur-3xl group-active:scale-150 transition-transform"></div>
        </a>

        <!-- Botones Secundarios -->
        <a href="{{ url_for('guide') }}" class="flex flex-col items-center justify-center p-8 rounded-[2.5rem] transition-all duration-300 ease-out active:scale-95 glass shadow-xl shadow-blue-500/20">
            <div class="bg-blue-500/5 dark:bg-white/10 p-4 rounded-3xl mb-4 backdrop-blur-md">
                <span class="text-3xl">📖</span>
            </div>
            <span class="text-[0.75rem] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">GUIA</span>
        </a>

        <a href="{{ url_for('settings') }}" class="flex flex-col items-center justify-center p-8 rounded-[2.5rem] transition-all duration-300 ease-out active:scale-95 glass shadow-xl shadow-blue-500/20">
            <div class="bg-blue-500/5 dark:bg-white/10 p-4 rounded-3xl mb-4 backdrop-blur-md">
                <span class="text-3xl">⚙️</span>
            </div>
            <span class="text-[0.75rem] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">AJUSTES</span>
        </a>
    </div>
</div>

<!-- Imágenes Flotantes con Pulsación Ligera -->
<img src="/static/logo.png" alt="Logo Emaús" class="absolute bottom-4 left-20 w-16 h-auto pointer-events-none z-50 animate-subtle-pulse">
<img src="/static/virgenn.png" alt="Imagen Emaús" class="absolute bottom-4 right-20 w-24 h-auto pointer-events-none z-50 animate-subtle-pulse">

<script>
    const reflections = [
        "¿No ardía nuestro corazón mientras nos hablaba?",
        "Jesús camina contigo, incluso en el silencio.",
        "Reconócelo hoy al partir el pan del amor.",
        "La tristeza se disipa cuando el Maestro se acerca.",
        "Tu fe es el puente hacia el encuentro con el Resucitado.",
        "Despierta mi fe, Señor, para que mi esperanza deje de ser frágil.",
        "Dirige Tú nuestra esperanza y transforma lo que no comprendemos.",
        "Permite que cada cruz florezca en esperanza y en nueva vida.",
        "Convierte nuestro dolor en camino hacia la gloria.",
        "Enciende el fuego que derrite los corazones fríos y endurecidos.",
        "Abre mis ojos para reconocer cuándo debo ayudar y acompañar.",
        "Danos la gracia de reconocerte en cada gesto, en cada encuentro.",
        "Gracias Jesús por este encuentro que renueva mi camino."
    ];
    let index = 0;

    function adjustReflectionFontSize() {
        const el = document.getElementById('dynamic-reflection');
        const container = el.parentElement;
        
        // Resetear a tamaño base
        el.style.fontSize = '1.25rem'; // Equivale a text-xl
        let size = 125; // 1.25rem * 100
        
        // Reducir si hay desbordamiento
        while (el.scrollHeight > container.clientHeight && size > 70) {
            size -= 5;
            el.style.fontSize = (size / 100) + 'rem';
        }
    }

    setInterval(() => {
        const el = document.getElementById('dynamic-reflection');
        el.style.transform = "translateY(8px) scale(0.98)";
        el.style.opacity = "0"; el.style.filter = "blur(8px)";
        setTimeout(() => {
            index = (index + 1) % reflections.length;
            el.innerText = `"${reflections[index]}"`;
            adjustReflectionFontSize();
            el.style.transform = "translateY(0px) scale(1)";
            el.style.opacity = "1"; el.style.filter = "blur(0px)";
        }, 500);
    }, 6000);

    window.addEventListener('load', adjustReflectionFontSize);
</script>
{% endblock %}
